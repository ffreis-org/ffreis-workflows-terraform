name: Terraform Compliance Scan (Checkov)

on:
  workflow_call:
    inputs:
      scan-directory:
        description: "Directory to scan"
        type: string
        default: "."
      framework:
        description: "Checkov framework to use"
        type: string
        default: "terraform"
      soft-fail:
        description: "Exit 0 even if checks fail (soft-fail mode)"
        type: boolean
        default: false
      skip-check:
        description: "Comma-separated check IDs to skip, e.g. CKV_AWS_1,CKV_AWS_2"
        type: string
        default: ""
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false
      runner:
        description: |
          JSON-encoded runner label(s). Default: GitHub-hosted ubuntu-latest.
        required: false
        type: string
        default: '["ubuntu-latest"]'

jobs:
  checkov:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 15
    name: Compliance scan (checkov)
    permissions:
      contents: read
    runs-on: ${{ fromJson(inputs.runner) }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Install Checkov
        env:
          # scan-fix(scorecard:PinnedDependenciesID): hash-verified wheel download before install
          CHECKOV_VERSION: "3.2.0"
          CHECKOV_SHA256: "2719334876d0ee6a8ebe8d15ff393cbb4c13dcfe81e3cb9348ef2c1ed8372c6e"
        run: |
          set -euo pipefail
          pip download --only-binary=:all: --no-deps \
            "checkov==${CHECKOV_VERSION}" -d /tmp/checkov-wheel
          echo "${CHECKOV_SHA256}  /tmp/checkov-wheel/checkov-${CHECKOV_VERSION}-py3-none-any.whl" \
            | sha256sum -c
          # scan-fix(shellcheck:SC2086): quoted the wheel path — word-splitting/globbing on ${CHECKOV_VERSION}
          pip install --only-binary=:all: "/tmp/checkov-wheel/checkov-${CHECKOV_VERSION}-py3-none-any.whl"

      - name: Run Checkov (with soft-fail, with skip-check)
        if: ${{ inputs.soft-fail && inputs.skip-check != '' }}
        env:
          SCAN_DIRECTORY: ${{ inputs.scan-directory }}
          FRAMEWORK: ${{ inputs.framework }}
          SKIP_CHECK: ${{ inputs.skip-check }}
        run: |
          set -euo pipefail
          checkov \
            -d "$SCAN_DIRECTORY" \
            --framework "$FRAMEWORK" \
            --skip-check "$SKIP_CHECK" \
            --soft-fail \
            --quiet \
            --compact

      - name: Run Checkov (with soft-fail, no skip-check)
        if: ${{ inputs.soft-fail && inputs.skip-check == '' }}
        env:
          SCAN_DIRECTORY: ${{ inputs.scan-directory }}
          FRAMEWORK: ${{ inputs.framework }}
        run: |
          set -euo pipefail
          checkov \
            -d "$SCAN_DIRECTORY" \
            --framework "$FRAMEWORK" \
            --soft-fail \
            --quiet \
            --compact

      - name: Run Checkov (hard-fail, with skip-check)
        if: ${{ !inputs.soft-fail && inputs.skip-check != '' }}
        env:
          SCAN_DIRECTORY: ${{ inputs.scan-directory }}
          FRAMEWORK: ${{ inputs.framework }}
          SKIP_CHECK: ${{ inputs.skip-check }}
        run: |
          set -euo pipefail
          checkov \
            -d "$SCAN_DIRECTORY" \
            --framework "$FRAMEWORK" \
            --skip-check "$SKIP_CHECK" \
            --quiet \
            --compact

      - name: Run Checkov (hard-fail, no skip-check)
        if: ${{ !inputs.soft-fail && inputs.skip-check == '' }}
        env:
          SCAN_DIRECTORY: ${{ inputs.scan-directory }}
          FRAMEWORK: ${{ inputs.framework }}
        run: |
          set -euo pipefail
          checkov \
            -d "$SCAN_DIRECTORY" \
            --framework "$FRAMEWORK" \
            --quiet \
            --compact
