name: Terraform Compliance Scan (Checkov)

on:
  workflow_call:
    inputs:
      checkov-version:
        description: "Checkov version to install"
        type: string
        default: "3.2.0"
      scan-directory:
        description: "Directory to scan"
        type: string
        default: "."
      framework:
        description: "Checkov framework to use"
        type: string
        default: "terraform"
      soft-fail:
        description: "Exit 0 even if checks fail (soft-fail mode)"
        type: boolean
        default: false
      skip-check:
        description: "Comma-separated check IDs to skip, e.g. CKV_AWS_1,CKV_AWS_2"
        type: string
        default: ""
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false

jobs:
  checkov:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 15
    name: Compliance scan (checkov)
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Install Checkov
        env:
          CHECKOV_VERSION: ${{ inputs.checkov-version }}
        run: |
          set -euo pipefail
          pip install --only-binary=:all: "checkov==${CHECKOV_VERSION}"

      - name: Run Checkov (with soft-fail, with skip-check)
        if: ${{ inputs.soft-fail && inputs.skip-check != '' }}
        env:
          SCAN_DIRECTORY: ${{ inputs.scan-directory }}
          FRAMEWORK: ${{ inputs.framework }}
          SKIP_CHECK: ${{ inputs.skip-check }}
        run: |
          set -euo pipefail
          checkov \
            -d "$SCAN_DIRECTORY" \
            --framework "$FRAMEWORK" \
            --skip-check "$SKIP_CHECK" \
            --soft-fail \
            --quiet \
            --compact

      - name: Run Checkov (with soft-fail, no skip-check)
        if: ${{ inputs.soft-fail && inputs.skip-check == '' }}
        env:
          SCAN_DIRECTORY: ${{ inputs.scan-directory }}
          FRAMEWORK: ${{ inputs.framework }}
        run: |
          set -euo pipefail
          checkov \
            -d "$SCAN_DIRECTORY" \
            --framework "$FRAMEWORK" \
            --soft-fail \
            --quiet \
            --compact

      - name: Run Checkov (hard-fail, with skip-check)
        if: ${{ !inputs.soft-fail && inputs.skip-check != '' }}
        env:
          SCAN_DIRECTORY: ${{ inputs.scan-directory }}
          FRAMEWORK: ${{ inputs.framework }}
          SKIP_CHECK: ${{ inputs.skip-check }}
        run: |
          set -euo pipefail
          checkov \
            -d "$SCAN_DIRECTORY" \
            --framework "$FRAMEWORK" \
            --skip-check "$SKIP_CHECK" \
            --quiet \
            --compact

      - name: Run Checkov (hard-fail, no skip-check)
        if: ${{ !inputs.soft-fail && inputs.skip-check == '' }}
        env:
          SCAN_DIRECTORY: ${{ inputs.scan-directory }}
          FRAMEWORK: ${{ inputs.framework }}
        run: |
          set -euo pipefail
          checkov \
            -d "$SCAN_DIRECTORY" \
            --framework "$FRAMEWORK" \
            --quiet \
            --compact
