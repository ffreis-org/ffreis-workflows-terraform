# Workflow: release-please for aggregator
# This workflow enables automatic releases using release-please for this workflow aggregator repo.

name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    permissions:
      contents: write
      pull-requests: write
      issues: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-release-please.yml@3858e9e74c805067e454740b195372c7195f333b # v1.5.0
    with:
      dry-run: false
      config-file: .release-please-config.json
      manifest-file: .release-please-manifest.json
      target-branch: main
