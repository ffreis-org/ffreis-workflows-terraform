name: Terraform Security Scan (Trivy)

on:
  workflow_call:
    inputs:
      scan-ref:
        description: "Directory to scan, e.g. 'infra/' or '.'"
        type: string
        default: "."
      severity:
        description: "Comma-separated list of severities to report"
        type: string
        default: "HIGH,CRITICAL"
      exit-code:
        description: "Exit code when vulnerabilities are found"
        type: number
        default: 1
      upload-sarif:
        description: "Upload SARIF to GitHub code scanning"
        type: boolean
        default: true
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false

jobs:
  security:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 30
    name: Security (trivy)
    permissions:
      contents: read
      actions: read
      security-events: write
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Run Trivy (table)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: config
          scan-ref: ${{ inputs.scan-ref }}
          exit-code: "0"
          severity: ${{ inputs.severity }}
          format: table
          output: trivy.txt
          hide-progress: true

      - name: Publish Trivy findings to summary
        if: always()
        shell: bash
        run: |
          if [[ -s trivy.txt ]]; then
            {
              echo "### Trivy findings"
              echo ""
              echo "<pre>"
              cat trivy.txt
              echo "</pre>"
            } >> "$GITHUB_STEP_SUMMARY"
            cat trivy.txt
          else
            echo "No Trivy findings were written to trivy.txt"
          fi

      - name: Run Trivy (Terraform config scan)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: config
          scan-ref: ${{ inputs.scan-ref }}
          exit-code: ${{ inputs.exit-code }}
          severity: ${{ inputs.severity }}
          format: sarif
          output: trivy.sarif
          hide-progress: true
          limit-severities-for-sarif: true
          skip-setup-trivy: true

      - name: Validate SARIF output
        shell: bash
        run: |
          set -euo pipefail
          test -s trivy.sarif || (echo "trivy.sarif was not generated or is empty" >&2 && exit 1)

      - name: Upload SARIF
        if: inputs.upload-sarif && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          sarif_file: trivy.sarif
          category: trivy-config
