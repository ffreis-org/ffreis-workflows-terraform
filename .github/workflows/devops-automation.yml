name: DevOps / Automation

on:
  schedule:
    - cron: "40 4 28 * *"  # monthly scattered (was: 0 3 * * 0)
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scorecard:
    if: vars.SCORECARD_ENABLED == 'true' && github.event_name != 'pull_request'
    permissions:
      contents: read
      actions: read
      security-events: write
      id-token: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-scorecard.yml@ef5f76c297dba0d2990210a905d045c826092427 # v1.4.3
    with:
      upload-sarif: true

  stale:
    if: vars.STALE_ENABLED == 'true' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      issues: write
      pull-requests: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-stale.yml@ef5f76c297dba0d2990210a905d045c826092427 # v1.4.3
    with:
      only: "both"

  release-please:
    if: vars.RELEASE_PLEASE_ENABLED != 'false' && github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write
      issues: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-release-please.yml@ef5f76c297dba0d2990210a905d045c826092427 # v1.4.3
    with:
      target-branch: "main"
    secrets:
      RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
