name: Terraform Validate

on:
  workflow_call:
    inputs:
      terraform-version:
        description: "Terraform version to use"
        type: string
        default: "1.9.8"
      chdir:
        description: "Terraform root module directory relative to repo root"
        type: string
        default: "stack"
      validate-all-modules:
        description: "If true, discovers and validates all module subdirs via find modules -mindepth 1 -maxdepth 1 -type d"
        type: boolean
        default: false
      modules-dir:
        description: "Used when validate-all-modules is true"
        type: string
        default: "modules"
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false
      runner:
        description: |
          JSON-encoded runner label(s). Default: GitHub-hosted ubuntu-latest.
          Self-hosted homelab box (private repos only): '["self-hosted","local"]'
        required: false
        type: string
        default: '["ubuntu-latest"]'

jobs:
  validate:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 15
    name: Validate (terraform validate)
    permissions:
      contents: read
    runs-on: ${{ fromJson(inputs.runner) }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ inputs.terraform-version }}

      - name: Validate single root module
        if: ${{ !inputs.validate-all-modules }}
        env:
          CHDIR: ${{ inputs.chdir }}
        run: |
          set -euo pipefail
          terraform -chdir="$CHDIR" init -backend=false -input=false
          terraform -chdir="$CHDIR" validate

      - name: Validate all modules
        if: ${{ inputs.validate-all-modules }}
        env:
          MODULES_DIR: ${{ inputs.modules-dir }}
        run: |
          set -euo pipefail
          find "$MODULES_DIR" -mindepth 1 -maxdepth 1 -type d | sort | while read -r dir; do
            echo "── Validating $dir ──"
            terraform -chdir="$dir" init -backend=false -input=false
            terraform -chdir="$dir" validate
          done
