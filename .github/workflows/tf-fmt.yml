name: Terraform Format Check

on:
  workflow_call:
    inputs:
      terraform-version:
        description: "Terraform version to use"
        type: string
        default: "1.9.8"
      working-directory:
        description: "Directory to run terraform fmt -check -recursive against"
        type: string
        default: "."
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false

jobs:
  fmt:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 15
    name: Format (terraform fmt)
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ inputs.terraform-version }}

      - name: Check formatting
        env:
          WORKING_DIR: ${{ inputs.working-directory }}
        run: terraform fmt -check -recursive "$WORKING_DIR"
