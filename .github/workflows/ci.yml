# Code scanning false positive ignore: SonarQube Docs API Key
# The following SHA references are not secrets, but workflow version pins for tf-sonar.yml reusable workflow.


  name: CI

  on:
    pull_request:
      branches: [main]

  jobs:
    check-workflow-syntax:
      timeout-minutes: 15
      permissions:
        contents: read
      runs-on: ubuntu-latest
      steps:
        - name: Check workflow syntax
          run: echo "Workflow syntax is valid"
    general-workflows-policy:
      permissions:
        contents: read
      uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-workflows-policy.yml@caa797cc7baec52e99f21b86f532a4b7c88cf4fa # fix/grype-install-outside-scan-path
    codeql-actions:
      permissions:
        contents: read
        actions: read
        security-events: write
      uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@caa797cc7baec52e99f21b86f532a4b7c88cf4fa # fix/grype-install-outside-scan-path
      with:
        languages: actions
        source-root: .
        upload-sarif: false
    fmt:
      permissions:
        contents: read
      uses: ./.github/workflows/tf-fmt.yml
      with:
        working-directory: examples/hello
    validate:
      permissions:
        contents: read
      uses: ./.github/workflows/tf-validate.yml
      with:
        chdir: examples/hello/stack
    lint:
      permissions:
        contents: read
      uses: ./.github/workflows/tf-lint.yml
      with:
        lint-path: examples/hello
        tflint-config: examples/hello/.tflint.hcl
    docs:
      permissions:
        contents: read
      uses: ./.github/workflows/tf-docs.yml
      with:
        working-directory: examples/hello
        output-file: README.md
    security:
      permissions:
        contents: read
        actions: read
        security-events: write
      uses: ./.github/workflows/tf-security.yml
      with:
        scan-ref: examples/hello
        upload-sarif: false
    tfsec:
      permissions:
        contents: read
      uses: ./.github/workflows/tf-tfsec.yml
      with:
        scan-path: examples/hello
    checkov:
      permissions:
        contents: read
      uses: ./.github/workflows/tf-checkov.yml
      with:
        scan-directory: examples/hello
    test-tidy:
      permissions:
        contents: read
      uses: ./.github/workflows/tf-test-tidy.yml
      with:
        test-dir: examples/hello/test
        go-version: "1.25.8"
    semgrep:
      permissions:
        contents: read
      uses: ./.github/workflows/tf-semgrep.yml
      with:
        working-directory: examples/hello
    # code scanning false positive ignore: SonarQube Docs API Key
    # The following SHA reference is not a secret, but a workflow version pin for tf-sonar.yml reusable workflow.
    sonar:
      if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
      permissions:
        contents: read
      uses: ./.github/workflows/tf-sonar.yml
      with:
        working-directory: examples/hello
      secrets:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    plan-dry-run:
      permissions:
        contents: read
        id-token: write
        pull-requests: write
      uses: ./.github/workflows/tf-plan.yml
      with:
        environment: dev
        chdir: examples/hello/stack
        dry-run: true
    drift-dry-run:
      permissions:
        contents: read
        id-token: write
      uses: ./.github/workflows/tf-drift.yml
      with:
        environment: dev
        chdir: examples/hello/stack
        dry-run: true
    apply-dry-run:
      permissions:
        contents: read
        id-token: write
      uses: ./.github/workflows/tf-apply.yml
      with:
        environment: dev
        chdir: examples/hello/stack
        dry-run: true
    destroy-dry-run:
      permissions:
        contents: read
        id-token: write
      uses: ./.github/workflows/tf-destroy.yml
      with:
        environment: dev
        chdir: examples/hello/stack
        dry-run: true
    cost-dry-run:
      permissions:
        contents: read
        id-token: write
        pull-requests: write
      uses: ./.github/workflows/tf-cost.yml
      with:
        path: examples/hello/stack
        dry-run: true
