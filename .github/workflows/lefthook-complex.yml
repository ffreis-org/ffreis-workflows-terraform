name: Lefthook Complex

on:
  workflow_dispatch:
    inputs:
      tier:
        description: "Heavy lefthook tier to run on the whole tree"
        type: choice
        options: [complex, release]
        default: complex

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lefthook-complex:
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-lefthook-complex.yml@55caebd74b1d1057c52ab6745d5809bddc8406de # v1.4.1
    with:
      working-directory: "."
      tier: ${{ inputs.tier }}
      setup-go: false
      install-golangci-lint: false
      install-govulncheck: false
      lefthook-bootstrap-command: "make lefthook-bootstrap"
      lefthook-bin: ".bin/lefthook"
