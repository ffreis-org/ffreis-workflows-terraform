name: Terraform Docs Drift Check

on:
  workflow_call:
    inputs:
      terraform-docs-version:
        description: "terraform-docs version to install"
        type: string
        default: "v0.19.0"
      working-directory:
        description: "Root dir to scan for modules"
        type: string
        default: "."
      output-file:
        description: "Docs output file name inside each module"
        type: string
        default: "README.md"
      output-mode:
        description: "inject or replace"
        type: string
        default: "inject"

jobs:
  docs:
    timeout-minutes: 15
    name: Docs drift check (terraform-docs)
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Install terraform-docs
        env:
          VERSION: ${{ inputs.terraform-docs-version }}
        run: |
          set -euo pipefail
          # VERSION is expected to include the leading 'v' to match the release tag and archive filename
          ARCHIVE="terraform-docs-${VERSION}-linux-amd64.tar.gz"
          URL="https://github.com/terraform-docs/terraform-docs/releases/download/${VERSION}/${ARCHIVE}"
          curl -sSLo /tmp/terraform-docs.tar.gz "${URL}"
          tar -xzf /tmp/terraform-docs.tar.gz -C /tmp terraform-docs
          chmod +x /tmp/terraform-docs
          sudo mv /tmp/terraform-docs /usr/local/bin/terraform-docs
          terraform-docs --version

      - name: Generate terraform-docs for each module
        env:
          WORKING_DIR: ${{ inputs.working-directory }}
          OUTPUT_FILE: ${{ inputs.output-file }}
          OUTPUT_MODE: ${{ inputs.output-mode }}
        run: |
          set -euo pipefail

          # Collect module dirs: subdirectories of working-directory that contain .tf files
          find "${WORKING_DIR}" -mindepth 1 -maxdepth 1 -type d | sort | while read -r dir; do
            if ls "${dir}"/*.tf > /dev/null 2>&1; then
              echo "── Running terraform-docs on ${dir} ──"
              terraform-docs markdown table \
                --output-file "${OUTPUT_FILE}" \
                --output-mode "${OUTPUT_MODE}" \
                "${dir}"
            fi
          done

          # If working-directory itself contains .tf files, run there too
          if ls "${WORKING_DIR}"/*.tf > /dev/null 2>&1; then
            echo "── Running terraform-docs on ${WORKING_DIR} ──"
            terraform-docs markdown table \
              --output-file "${OUTPUT_FILE}" \
              --output-mode "${OUTPUT_MODE}" \
              "${WORKING_DIR}"
          fi

      - name: Fail if docs are stale
        run: |
          set -euo pipefail
          # Intent-to-add untracked files so a module with NO committed README
          # (a brand-new generated file) is caught too. `git diff --exit-code`
          # alone ignores untracked files, so a module missing its docs entirely
          # would otherwise pass silently — only edits to already-tracked
          # READMEs were ever validated.
          git add -AN
          git diff --exit-code || {
            echo ""
            echo "terraform-docs output has changed, or a module is missing a committed README.md."
            echo "Run terraform-docs locally and commit the generated README.md files."
            exit 1
          }
