name: Terraform Test Tidy (Terratest)

on:
  workflow_call:
    inputs:
      go-version:
        description: "Go version to use"
        type: string
        default: "1.25.8"
      test-dir:
        description: "Directory containing go.mod for tests"
        type: string
        default: "test"
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false
      runner:
        description: |
          JSON-encoded runner label(s). Default: GitHub-hosted ubuntu-latest.
          Self-hosted homelab box (private repos only): '["self-hosted","local"]'
        required: false
        type: string
        default: '["ubuntu-latest"]'

jobs:
  test-tidy:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 30
    name: Test module (tidy + build)
    permissions:
      contents: read
    runs-on: ${{ fromJson(inputs.runner) }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go-version }}
          cache-dependency-path: ${{ inputs.test-dir }}/go.sum

      - name: Verify go.mod is tidy
        env:
          TEST_DIR: ${{ inputs.test-dir }}
        run: |
          set -euo pipefail
          cd "$TEST_DIR"
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Compile test package (no AWS needed)
        env:
          TEST_DIR: ${{ inputs.test-dir }}
        run: cd "$TEST_DIR" && go build ./...
