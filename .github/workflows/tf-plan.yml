name: Terraform Plan

on:
  workflow_call:
    inputs:
      terraform-version:
        description: "Terraform version to use"
        type: string
        default: "1.9.8"
      environment:
        description: "e.g. dev, staging, prod"
        type: string
        required: true
      chdir:
        description: "Terraform root module directory relative to repo root"
        type: string
        default: "infra/stack"
      backend-config:
        description: >-
          Path to a -backend-config file (e.g. envs/prod/backend.hcl), relative to
          `chdir`. Required whenever the root module's backend block has no inline
          bucket/key/region (the common pattern for repos with per-env state).
          Backend config values (bucket, key, region, lock table) are not secrets —
          they're committed alongside the .tfvars for the same environment.
        type: string
        default: ""
      aws-region:
        description: "AWS region"
        type: string
        default: "us-east-1"
      plan-args:
        description: "Extra terraform plan flags"
        type: string
        default: ""
      dry-run:
        description: "If true, validates configuration without requiring AWS credentials/state"
        type: boolean
        default: false
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false
    secrets:
      AWS_ROLE_ARN:
        required: false

jobs:
  plan:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 30
    name: Plan (${{ inputs.environment }})
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ inputs.terraform-version }}

      - name: Require AWS_ROLE_ARN (when dry-run=false)
        if: ${{ !inputs.dry-run }}
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          set -euo pipefail
          if [[ -z "$AWS_ROLE_ARN" ]]; then
            echo "::error::Missing required secret AWS_ROLE_ARN"
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        if: ${{ !inputs.dry-run }}
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}
          role-session-name: github-${{ github.run_id }}-${{ inputs.environment }}-plan

      - name: Terraform init
        id: init
        env:
          CHDIR: ${{ inputs.chdir }}
          DRY_RUN: ${{ inputs.dry-run }}
          BACKEND_CONFIG: ${{ inputs.backend-config }}
        run: |
          set -euo pipefail
          if [[ "$DRY_RUN" == "true" ]]; then
            terraform -chdir="$CHDIR" init -backend=false -input=false
          elif [[ -n "$BACKEND_CONFIG" ]]; then
            terraform -chdir="$CHDIR" init -input=false -backend-config="$BACKEND_CONFIG"
          else
            terraform -chdir="$CHDIR" init -input=false
          fi

      - name: Terraform plan
        id: plan
        if: ${{ !inputs.dry-run }}
        env:
          TF_CLI_ARGS_plan: ${{ inputs.plan-args }}
          CHDIR: ${{ inputs.chdir }}
        run: |
          set -euo pipefail
          terraform -chdir="$CHDIR" plan \
            -no-color \
            -out=tfplan \
            2>&1 | tee /tmp/tfplan-output.txt

      - name: Terraform validate (dry-run)
        if: ${{ inputs.dry-run }}
        env:
          CHDIR: ${{ inputs.chdir }}
        run: |
          set -euo pipefail
          terraform -chdir="$CHDIR" validate -no-color

      - name: Post plan output as PR comment
        if: github.event_name == 'pull_request' && !inputs.dry-run
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const fs = require('fs');
            const env = '${{ inputs.environment }}';
            const planOutcome = '${{ steps.plan.outcome }}';
            const initOutcome = '${{ steps.init.outcome }}';

            let planOutput = '';
            if (fs.existsSync('/tmp/tfplan-output.txt')) {
              planOutput = fs.readFileSync('/tmp/tfplan-output.txt', 'utf8');
              if (planOutput.length > 10000) {
                planOutput = planOutput.substring(0, 10000) + '\n...(output truncated)';
              }
            }

            const statusIcon = (outcome) => outcome === 'success' ? '✅' : '❌';

            const comment = [
              `## Terraform Plan — \`${env}\``,
              '',
              `${statusIcon(initOutcome)} **Init** \`${initOutcome}\``,
              `${statusIcon(planOutcome)} **Plan** \`${planOutcome}\``,
              '',
              planOutput
                ? `<details><summary>Plan output</summary>\n\n\`\`\`terraform\n${planOutput}\n\`\`\`\n</details>`
                : '',
              '',
              `*Triggered by @${{ github.actor }} on \`${{ github.event_name }}\`*`,
            ].join('\n');

            // Find and update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = `<!-- tf-plan-${env} -->`;
            const existing = comments.find(c => c.body.includes(marker));

            const body = marker + '\n' + comment;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
