name: Terraform SonarCloud

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory containing the Terraform configuration to scan"
        type: string
        default: "."
      sonar-project-key:
        description: "SonarCloud project key (defaults to sonar-project.properties or owner_repo)"
        type: string
        default: ""
      sonar-organization:
        description: "SonarCloud organization slug (defaults to sonar-project.properties or repository owner)"
        type: string
        default: ""
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false
      runner:
        description: |
          JSON-encoded runner label(s). Default: GitHub-hosted ubuntu-latest.
        required: false
        type: string
        default: '["ubuntu-latest"]'
    secrets:
      SONAR_TOKEN:
        required: true

jobs:
  sonar:
    timeout-minutes: 30
    name: SonarCloud
    permissions:
      contents: read
    runs-on: ${{ fromJson(inputs.runner) }}
    if: vars.SONAR_ENABLED != 'false' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0

      - name: Resolve Sonar settings
        id: vars
        env:
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
          INPUT_PROJECT_KEY: ${{ inputs.sonar-project-key }}
          INPUT_ORG: ${{ inputs.sonar-organization }}
          VAR_ORG: ${{ vars.SONAR_ORGANIZATION }}
          REPO: ${{ github.repository }}
          REPO_OWNER: ${{ github.repository_owner }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "$SONAR_TOKEN" ]]; then
            echo "ERROR: SONAR_TOKEN is required. Configure repository secret SONAR_TOKEN." >&2
            exit 1
          fi

          project_key="$INPUT_PROJECT_KEY"
          org="$INPUT_ORG"

          props="${WORKING_DIRECTORY%/}/sonar-project.properties"
          if [[ -f "$props" ]]; then
            if [[ -z "$project_key" ]]; then
              project_key="$(sed -n 's/^[[:space:]]*sonar\\.projectKey[[:space:]]*=[[:space:]]*//p' "$props" | head -n 1 || true)"
            fi
            if [[ -z "$org" ]]; then
              org="$(sed -n 's/^[[:space:]]*sonar\\.organization[[:space:]]*=[[:space:]]*//p' "$props" | head -n 1 || true)"
            fi
          fi

          if [[ -z "$project_key" ]]; then
            project_key="${REPO//\//_}"
          fi
          if [[ -z "$org" ]]; then
            org="$VAR_ORG"
          fi
          if [[ -z "$org" ]]; then
            org="$(echo "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')"
          fi

          {
            echo "project_key=$project_key"
            echo "org=$org"
          } >> "$GITHUB_OUTPUT"

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # nosemgrep: generic.secrets.security.detected-sonarqube-docs-api-key.detected-sonarqube-docs-api-key
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: ${{ inputs.working-directory }}
          args: >
            -Dsonar.projectKey=${{ steps.vars.outputs.project_key }}
            -Dsonar.organization=${{ steps.vars.outputs.org }}
            -Dsonar.sources=.
