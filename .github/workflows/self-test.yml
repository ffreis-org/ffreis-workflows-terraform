name: Self Test

on:
  push:
    branches: [main]

# Validates the static-analysis and security workflows against examples/hello/.
#
# tf-sonar requires SONAR_TOKEN to be configured in the repository. The job
# is skipped on fork pull requests (secrets are not available to forks), but
# runs on all other events and fails if the token is absent.
#
# The AWS-backed workflows (tf-plan/apply/destroy/drift/cost) are exercised in
# `dry-run: true` mode so the workflow wiring is continuously validated without
# requiring live infrastructure or secrets.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  workflows-policy:
    permissions:
      contents: read
      uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-workflows-policy.yml@3858e9e74c805067e454740b195372c7195f333b # v1.5.0

  codeql-actions:
    permissions:
      contents: read
      uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@3858e9e74c805067e454740b195372c7195f333b # v1.5.0
    with:
      languages: actions
      source-root: .
      upload-sarif: false

  fmt:
    permissions:
      contents: read
    uses: ./.github/workflows/tf-fmt.yml
    with:
      working-directory: examples/hello

  validate:
    permissions:
      contents: read
    uses: ./.github/workflows/tf-validate.yml
    with:
      chdir: examples/hello/stack

  lint:
    permissions:
      contents: read
    uses: ./.github/workflows/tf-lint.yml
    with:
      lint-path: examples/hello
      tflint-config: examples/hello/.tflint.hcl

  docs:
    permissions:
      contents: read
    uses: ./.github/workflows/tf-docs.yml
    with:
      working-directory: examples/hello
      output-file: README.md

  security:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: ./.github/workflows/tf-security.yml
    with:
      scan-ref: examples/hello
      upload-sarif: false

  tfsec:
    permissions:
      contents: read
    uses: ./.github/workflows/tf-tfsec.yml
    with:
      scan-path: examples/hello

  checkov:
    permissions:
      contents: read
    uses: ./.github/workflows/tf-checkov.yml
    with:
      scan-directory: examples/hello

  test-tidy:
    permissions:
      contents: read
    uses: ./.github/workflows/tf-test-tidy.yml
    with:
      test-dir: examples/hello/test

  semgrep:
    permissions:
      contents: read
    uses: ./.github/workflows/tf-semgrep.yml
    with:
      working-directory: examples/hello

  # code scanning false positive ignore: SonarQube Docs API Key
  # The following SHA reference is not a secret, but a workflow version pin for tf-sonar.yml reusable workflow.
  sonar:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    permissions:
      contents: read
    uses: ./.github/workflows/tf-sonar.yml
    with:
      working-directory: examples/hello
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  plan-dry-run:
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/tf-plan.yml
    with:
      environment: dev
      chdir: examples/hello/stack
      dry-run: true

  drift-dry-run:
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/tf-drift.yml
    with:
      environment: dev
      chdir: examples/hello/stack
      dry-run: true

  apply-dry-run:
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/tf-apply.yml
    with:
      environment: dev
      chdir: examples/hello/stack
      dry-run: true

  destroy-dry-run:
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/tf-destroy.yml
    with:
      environment: dev
      chdir: examples/hello/stack
      dry-run: true

  cost-dry-run:
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/tf-cost.yml
    with:
      path: examples/hello/stack
      dry-run: true
