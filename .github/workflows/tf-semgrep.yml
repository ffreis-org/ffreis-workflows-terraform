name: Terraform SAST (Semgrep)

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory to run steps in"
        type: string
        default: "."
      config:
        description: "Semgrep config/ruleset to use (e.g. auto, p/terraform)"
        type: string
        default: "auto"
      semgrep-version:
        description: "Semgrep version to install (pinned for reproducibility)"
        type: string
        default: "1.170.0"
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false
      runner:
        description: |
          JSON-encoded runner label(s). Default: GitHub-hosted ubuntu-latest.
        required: false
        type: string
        default: '["ubuntu-latest"]'

jobs:
  semgrep:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 30
    name: Semgrep SAST
    permissions:
      contents: read
    runs-on: ${{ fromJson(inputs.runner) }}

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Install Semgrep
        env:
          SEMGREP_VERSION: ${{ inputs.semgrep-version }}
        run: 'pip install --user --only-binary :all: "semgrep==${SEMGREP_VERSION}"'

      - name: Run Semgrep
        env:
          SEMGREP_CONFIG: ${{ inputs.config }}
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          semgrep ci --config "$SEMGREP_CONFIG"
