name: Terraform Security Scan (tfsec)

on:
  workflow_call:
    inputs:
      scan-path:
        description: "Directory to scan, e.g. 'infra/' or '.'"
        type: string
        default: "."
      soft-fail:
        description: "Exit 0 even when findings are present (useful during ramp-up)"
        type: boolean
        default: false
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false

jobs:
  tfsec:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 15
    name: Security (tfsec)
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@b466648d6e39e7c75324f25d83891162a721f2d6 # v1.0.4
        with:
          working_directory: ${{ inputs.scan-path }}
          soft_fail: ${{ inputs.soft-fail }}
