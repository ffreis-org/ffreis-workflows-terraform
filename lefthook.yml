remotes:
  - git_url: https://github.com/FelipeFuhr/ffreis-platform-standards
    ref: v1.6.0
    configs:
      - lefthook/base.yml
      - lefthook/actionlint.yml

# fmt-check targets examples/ only — overrides the terraform.yml default
pre-commit:
  commands:
    fmt-check:
      glob: "examples/**/*.tf"
      run: make fmt-check
    secret-scan:
      run: make secrets-scan-staged
    actionlint:
      run: actionlint

pre-push:
  parallel: false
  commands:
    lint:
      run: make lint
    actionlint:
      run: actionlint

commit-msg:
  commands:
    conventional-commits:
      run: ./scripts/hooks/check_commit_msg.sh {1}
